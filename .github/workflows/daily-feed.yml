name: Daily Aignal Feed

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate daily feed
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
        run: npm run generate-feed

      - name: Validate daily feed
        run: npm run validate-feed

      - name: Commit generated feed archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p public/images
          git add public/feed public/images
          git diff --cached --quiet || git commit -m "Update daily Aignal feed"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
